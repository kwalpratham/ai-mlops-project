name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Lint ───────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ scripts/

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Model Validation Gate ──────────────────────────────────────────
  model-validation:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model artifacts
        # In a real pipeline, this would pull from MLflow Model Registry or S3.
        # For CI, we assume models/ is committed or cached via GitHub Actions artifacts.
        run: |
          if [ ! -d "models/baseline" ]; then
            echo "⚠ No model found — skipping validation gate."
            echo "SKIP_VALIDATION=true" >> $GITHUB_ENV
          fi

      - name: Validate model on fixtures (F1 > 0.85)
        if: env.SKIP_VALIDATION != 'true'
        run: python scripts/validate_model.py baseline

  # ── Job 4: Docker Build & Push ────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Push is disabled for the assignment; enable in production:
          # push: true
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Production flow:
      # 1. Push image to GHCR → triggers CD webhook
      # 2. CD pipeline pulls new image, runs smoke tests on staging
      # 3. Canary deployment to production (10% traffic)
      # 4. Monitor error rate / latency for 15 min
      # 5. Full rollout or automatic rollback
